<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Access Denied - Pawan.Krd</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
        }

        .header {
            background: #000000;
            padding: 20px 40px;
            border-bottom: 1px solid #e5e5e5;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .status-code {
            font-size: 72px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            line-height: 1;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .description {
            font-size: 16px;
            color: #666666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .info-section {
            background: #f8f8f8;
            border-left: 3px solid #1a1a1a;
            padding: 24px;
            margin: 32px 0;
        }

        .info-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .info-item {
            margin: 12px 0;
            font-size: 15px;
            color: #4a4a4a;
            line-height: 1.6;
        }

        .info-item strong {
            color: #1a1a1a;
            font-weight: 500;
            display: inline-block;
            min-width: 80px;
        }

        a {
            color: #1a1a1a;
            text-decoration: underline;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }

        a:hover {
            opacity: 0.7;
        }

        .divider {
            height: 1px;
            background: #e5e5e5;
            margin: 32px 0;
        }

        .footer {
            background: #fafafa;
            border-top: 1px solid #e5e5e5;
            padding: 32px 40px;
        }

        .footer-content {
            max-width: 700px;
            margin: 0 auto;
        }

        .footer-item {
            font-size: 13px;
            color: #666666;
            line-height: 1.8;
            margin: 6px 0;
        }

        .footer-item strong {
            color: #1a1a1a;
            font-weight: 500;
        }

        .ray-id {
            display: inline-block;
            background: #e5e5e5;
            padding: 4px 10px;
            font-size: 12px;
            color: #4a4a4a;
            font-family: 'Courier New', monospace;
            margin-top: 16px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header {
                padding: 16px 24px;
            }

            .logo {
                font-size: 18px;
            }

            .main-content {
                padding: 32px 24px;
            }

            .status-code {
                font-size: 56px;
            }

            h1 {
                font-size: 26px;
            }

            .description {
                font-size: 15px;
            }

            .info-section {
                padding: 20px;
            }

            .footer {
                padding: 24px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 16px 20px;
            }

            .logo {
                font-size: 16px;
            }

            .main-content {
                padding: 24px 20px;
            }

            .status-code {
                font-size: 48px;
            }

            h1 {
                font-size: 24px;
            }

            .description {
                font-size: 14px;
            }

            .info-section {
                padding: 16px;
            }

            .info-item {
                font-size: 14px;
            }

            .info-item strong {
                display: block;
                margin-bottom: 4px;
            }

            .footer {
                padding: 20px;
            }

            .footer-item {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- <div class="header">
        <div class="logo">Pawan.Krd</div>
    </div> -->

    <div class="main-content">
        <div class="container">
            <div class="status-code">403</div>
            <h1>Access Denied</h1>
            <p class="description">
                You are unable to access this website. The owner of this website has blocked your access.
            </p>

            <div class="divider"></div>

            <div class="info-section">
                <div class="info-title">Contact Information</div>
                <div class="info-item">
                    <strong>Email:</strong> <a href="mailto:contact@pawan.krd">contact@pawan.krd</a>
                </div>
                <div class="info-item">
                    <strong>Discord:</strong> <a href="https://discord.gg/pawan" target="_blank">discord.gg/pawan</a>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="ray-id">Ray ID: ::RAY_ID::</div>
            <div class="divider"></div>
            <div class="footer-item"><strong>PKRD, LLC</strong></div>
            <div class="footer-item">1207 Delaware Ave #3553, Wilmington Delaware 19806</div>
            <div class="footer-item"><strong>Phone:</strong> +1 302 924 8487</div>
        </div>
    </div>
</body>
</html>
